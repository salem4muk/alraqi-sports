name: alraqi-sports
services:
  - name: web
    environment_slug: node-js
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
